<app-auth-layout>
  <app-auth-card title="Create Account" subtitle="Create your AI Platform account">
    <form [formGroup]="registerForm" (ngSubmit)="register()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label>Company</label>
        <input type="text" formControlName="companyName" placeholder="Company Name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Password">
          <button type="button" class="toggle-btn" (click)="hidePassword=!hidePassword">
            {{hidePassword ? '👁' : '︶' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword"
            placeholder="Confirm Password">
          <button type="button" class="toggle-btn" (click)="hideConfirmPassword=!hideConfirmPassword">
            {{hideConfirmPassword ? '👁' : '︶'}}
          </button>
        </div>
      </div>

      <label class="checkbox">
        <input type="checkbox" formControlName="acceptTerms">
        I accept the Terms & Conditions
      </label>

      <button class="register-btn" type="submit" [disabled]="loading">
        {{loading ? 'Creating...' : 'Create Account'}}
      </button>

      <p class="login-link">
        Already have an account?
        <a routerLink="/auth/login">
          Sign In
        </a>
      </p>

    </form>

  </app-auth-card>
</app-auth-layout>
